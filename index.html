<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>✨ Life, Organized ✨</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #fff0f6;
    --panel: #fffafd;
    --ink: #6a2c4f;
    --muted: #c285a8;
    --line: #ffd9ec;
    --accent: #ff5fa2;
    --accent-soft: #ffe1ef;
    --warm: #ff8fab;
    --warm-soft: #ffe4ec;
    --blue: #b983ff;
    --blue-soft: #f0e4ff;
    --purple: #c77dff;
    --purple-soft: #f6e3ff;
    --gold: #ffc857;
    --radius: 22px;
    --shadow: 0 2px 6px rgba(255,95,162,0.08), 0 10px 30px rgba(255,95,162,0.12);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Quicksand", "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    background-color: var(--bg);
    background-image:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,.7) 0 1.5px, transparent 2px),
      radial-gradient(circle at 78% 12%, rgba(255,200,87,.55) 0 1.5px, transparent 2px),
      radial-gradient(circle at 42% 72%, rgba(255,255,255,.6) 0 1.5px, transparent 2px),
      radial-gradient(circle at 88% 64%, rgba(255,255,255,.6) 0 1.5px, transparent 2px),
      radial-gradient(circle at 24% 88%, rgba(255,200,87,.45) 0 1.5px, transparent 2px),
      linear-gradient(160deg, #ffe3f1 0%, #ffeef6 40%, #fff4f9 100%);
    background-attachment: fixed;
    background-size: 220px 220px, 260px 260px, 300px 300px, 240px 240px, 280px 280px, 100% 100%;
  }
  header.app {
    padding: 32px 24px 12px;
    max-width: 1100px;
    margin: 0 auto;
  }
  header.app h1 {
    margin: 0;
    font-family: "Fredoka", "Quicksand", sans-serif;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  header.app h1 .grad {
    background: linear-gradient(90deg, #ff5fa2, #c77dff 55%, #ffab40);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header.app .sub {
    color: var(--muted);
    font-size: 14px;
    margin-top: 6px;
    font-weight: 500;
  }
  nav.tabs {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(255,240,246,0.82);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  nav.tabs .inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    overflow-x: auto;
  }
  nav.tabs button {
    border: 1.5px solid transparent;
    background: #fff;
    color: var(--muted);
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 700;
    padding: 8px 15px;
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .18s ease;
    box-shadow: 0 1px 4px rgba(255,95,162,.07);
  }
  nav.tabs button:hover { color: var(--accent); border-color: var(--line); transform: translateY(-1px); }
  nav.tabs button.active {
    background: linear-gradient(135deg, #ff5fa2, #c77dff);
    color: #fff;
    box-shadow: 0 4px 14px rgba(255,95,162,.4);
  }
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }
  .view { display: none; animation: fade .25s ease; }
  .view.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .grid { display: grid; gap: 16px; }
  .grid.cols-2 { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
  .grid.cols-3 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .grid.cols-4 { grid-template-columns: repeat(auto-fit, minmax(235px, 1fr)); }

  .card {
    background: var(--panel);
    border: 1.5px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px;
  }
  .card h2 {
    margin: 0 0 4px;
    font-family: "Fredoka", "Quicksand", sans-serif;
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card .hint { color: var(--muted); font-size: 13px; margin: 0 0 14px; font-weight: 500; }
  .tag {
    font-size: 11px;
    font-weight: 700;
    text-transform: lowercase;
    letter-spacing: .02em;
    padding: 4px 11px;
    border-radius: 999px;
    color: var(--accent);
    background: var(--accent-soft);
  }
  .tag.warm { color: #e26d8a; background: var(--warm-soft); }
  .tag.blue { color: #9a5fe0; background: var(--blue-soft); }
  .tag.purple { color: var(--purple); background: var(--purple-soft); }

  /* Goals */
  .goal-list { list-style: none; margin: 0; padding: 0; }
  .goal-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px dashed var(--line);
  }
  .goal-item:last-child { border-bottom: none; }
  .goal-item input[type=checkbox] {
    width: 18px; height: 18px;
    margin-top: 3px;
    accent-color: var(--accent);
    cursor: pointer;
    flex: 0 0 auto;
  }
  .goal-item .text {
    flex: 1;
    border: none;
    background: transparent;
    font: inherit;
    color: var(--ink);
    resize: none;
    outline: none;
    overflow: hidden;
    min-height: 24px;
  }
  .goal-item .text::placeholder { color: var(--muted); }
  .goal-item.done .text { text-decoration: line-through; color: var(--muted); }
  .goal-item .del {
    border: none; background: none; color: var(--muted);
    cursor: pointer; font-size: 16px; opacity: 0; transition: opacity .15s; padding: 0 4px;
  }
  .goal-item:hover .del { opacity: 1; }
  .add-btn {
    margin-top: 10px;
    border: 1.5px dashed var(--accent);
    background: var(--accent-soft);
    color: var(--accent);
    font: inherit;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 999px;
    cursor: pointer;
    width: 100%;
    transition: all .15s;
  }
  .add-btn:hover { background: #ffd2e7; transform: translateY(-1px); }

  /* Habits */
  .habit-table { width: 100%; border-collapse: collapse; }
  .habit-table th, .habit-table td { text-align: center; padding: 6px 4px; font-size: 13px; }
  .habit-table th { color: var(--muted); font-weight: 600; }
  .habit-table td.name, .habit-table th.name { text-align: left; min-width: 130px; }
  .habit-name-input {
    border: none; background: transparent; font: inherit; font-weight: 600;
    color: var(--ink); width: 100%; outline: none;
  }
  .habit-name-input::placeholder { color: var(--muted); font-weight: 500; }
  .hcell {
    width: 27px; height: 27px; border-radius: 9px; border: 2px solid var(--line);
    cursor: pointer; margin: 0 auto; transition: all .14s; background: #fff;
  }
  .hcell.on {
    background: linear-gradient(135deg, #ff5fa2, #c77dff);
    border-color: transparent; box-shadow: 0 2px 8px rgba(255,95,162,.35);
    transform: scale(1.04);
  }
  .hcell:hover { border-color: var(--accent); }
  .habit-streak { font-size: 12px; color: var(--accent); font-weight: 700; }
  .row-del {
    border: none; background: none; color: var(--muted); cursor: pointer;
    opacity: 0; font-size: 15px;
  }
  tr:hover .row-del { opacity: 1; }
  .week-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .week-nav button {
    border: 1.5px solid var(--line); background: #fff; border-radius: 999px;
    width: 32px; height: 32px; cursor: pointer; font-size: 16px; color: var(--accent); font-weight: 700;
  }
  .week-nav button:hover { background: var(--accent-soft); border-color: var(--accent); }
  .week-nav .label { font-weight: 700; font-size: 14px; }

  /* Audit */
  .audit-area { margin-bottom: 8px; }
  .audit-row {
    display: flex; align-items: center; gap: 14px; padding: 12px 0;
    border-bottom: 1px dashed var(--line);
  }
  .audit-row:last-child { border-bottom: none; }
  .audit-label { flex: 1; }
  .audit-label .name { font-weight: 600; font-size: 14px; }
  .audit-label .note {
    border: none; background: transparent; font: inherit; font-size: 12.5px;
    color: var(--muted); width: 100%; outline: none; margin-top: 2px;
  }
  .audit-label .note::placeholder { color: var(--line); color: #c9c5bf; }
  .rating { display: flex; gap: 4px; flex: 0 0 auto; }
  .dot {
    width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--line);
    cursor: pointer; background: #fff; transition: all .1s;
  }
  .dot.filled { background: var(--score-color, var(--accent)); border-color: var(--score-color, var(--accent)); }
  .score-badge {
    width: 40px; text-align: right; font-weight: 700; font-size: 15px; color: var(--muted); flex: 0 0 auto;
  }
  .area-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
  }
  .area-avg { font-size: 13px; color: var(--muted); font-weight: 600; }

  /* Wheel */
  .wheel-wrap { display: flex; justify-content: center; padding: 10px 0; }

  /* Target / progress bars */
  .tbar { height: 14px; border-radius: 999px; background: var(--line); overflow: hidden; }
  .tfill { height: 100%; border-radius: 999px; transition: width .6s cubic-bezier(.2,.8,.2,1); }

  /* Gamification */
  .level-card {
    background: linear-gradient(135deg, #ff5fa2 0%, #c77dff 60%, #ffab73 100%);
    color: #fff; border: none;
    box-shadow: 0 10px 30px rgba(199,125,255,.4);
  }
  .level-meta .lvl-title { font-family: "Fredoka", sans-serif; }
  .level-top { display: flex; align-items: center; gap: 16px; }
  .level-badge {
    width: 64px; height: 64px; border-radius: 18px; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
  }
  .level-meta .lvl-num { font-size: 13px; opacity: .7; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
  .level-meta .lvl-title { font-size: 22px; font-weight: 800; letter-spacing: -.01em; }
  .xp-bar {
    margin-top: 16px; height: 12px; border-radius: 999px;
    background: rgba(255,255,255,.15); overflow: hidden;
  }
  .xp-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, #fff, var(--gold));
    transition: width .6s cubic-bezier(.2,.8,.2,1);
  }
  .xp-text { margin-top: 7px; font-size: 12.5px; opacity: .8; display: flex; justify-content: space-between; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 12px; }
  .stat {
    background: #fff; border: 1.5px solid var(--line); border-radius: 18px;
    padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(255,95,162,.06);
  }
  .stat .num { font-family: "Fredoka", sans-serif; font-size: 27px; font-weight: 600; color: var(--accent); letter-spacing: -.01em; }
  .stat .lbl { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 2px; }
  .stat .ico { font-size: 18px; }

  .chart-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 12px; font-size: 13px; }
  .chart-legend span { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-weight: 600; }
  .chart-legend i { width: 14px; height: 3px; border-radius: 2px; display: inline-block; }
  .empty-hint { color: var(--muted); font-size: 14px; padding: 20px 0; text-align: center; }

  .snap-list { list-style: none; margin: 14px 0 0; padding: 0; }
  .snap-item {
    display: flex; align-items: center; gap: 12px; padding: 8px 0;
    border-bottom: 1px dashed var(--line); font-size: 13.5px;
  }
  .snap-item:last-child { border-bottom: none; }
  .snap-item .date { font-weight: 600; min-width: 92px; }
  .snap-item .ov { color: var(--accent); font-weight: 700; }
  .snap-item .row-del { opacity: .4; margin-left: auto; }
  .snap-item:hover .row-del { opacity: 1; }

  .badge-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
  .badge {
    display: flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 999px;
    font-size: 13px; font-weight: 700; border: 1.5px solid var(--line); background: #fff; color: var(--muted);
  }
  .badge.earned { color: #fff; border-color: transparent; background: linear-gradient(135deg, #ff5fa2, #c77dff); box-shadow: 0 3px 12px rgba(255,95,162,.3); }
  .badge .b-ico { font-size: 16px; filter: grayscale(1); opacity: .5; }
  .badge.earned .b-ico { filter: none; opacity: 1; }

  /* Level-up celebration */
  .celebrate-overlay {
    position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center;
    background: rgba(20,18,16,.55); backdrop-filter: blur(3px); animation: fade .3s ease;
  }
  .celebrate-card {
    background: var(--panel); border-radius: 22px; padding: 36px 40px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.3); max-width: 340px; animation: pop .45s cubic-bezier(.2,1.3,.4,1);
  }
  @keyframes pop { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .celebrate-card .big {
    width: 88px; height: 88px; margin: 0 auto 14px; border-radius: 24px;
    display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 800; color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--blue));
  }
  .celebrate-card h3 { margin: 0 0 4px; font-size: 24px; font-family: "Fredoka", sans-serif; color: var(--accent); }
  .celebrate-card p { margin: 0 0 18px; color: var(--muted); }
  .celebrate-card button {
    border: none; background: linear-gradient(135deg, #ff5fa2, #c77dff); color: #fff; font: inherit; font-weight: 700;
    padding: 11px 26px; border-radius: 999px; cursor: pointer; box-shadow: 0 4px 14px rgba(255,95,162,.4);
  }
  .confetti { position: absolute; width: 9px; height: 14px; top: -20px; animation: drop linear forwards; }
  @keyframes drop { to { transform: translateY(105vh) rotate(540deg); opacity: 1; } }

  footer {
    max-width: 1100px; margin: 0 auto; padding: 0 16px 40px;
    color: var(--muted); font-size: 12px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  footer button {
    border: 1.5px solid var(--line); background: #fff; color: var(--muted);
    border-radius: 999px; padding: 6px 14px; cursor: pointer; font: inherit; font-weight: 600; font-size: 12px;
  }
  footer button:hover { color: var(--accent); border-color: var(--accent); }
  .save-flash { color: var(--accent); font-weight: 700; opacity: 0; transition: opacity .3s; }
  .save-flash.show { opacity: 1; }
  textarea.notes {
    width: 100%; border: 1.5px solid var(--line); border-radius: 16px; padding: 12px 14px;
    font: inherit; resize: vertical; min-height: 90px; outline: none; background: #fff;
  }
  textarea.notes:focus { border-color: var(--accent); }
  .pill-input {
    border: 1.5px solid var(--line); border-radius: 12px; padding: 8px 12px; font: inherit;
    outline: none; background: #fff; color: var(--ink);
  }
  .pill-input:focus { border-color: var(--accent); }
  label.field { display: block; font-size: 12px; color: var(--muted); font-weight: 700; margin-bottom: 4px; }
  /* prettier scrollbar + checkboxes */
  .goal-item input[type=checkbox] { accent-color: var(--accent); width: 19px; height: 19px; border-radius: 6px; }
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 999px; }
</style>
</head>
<body>
<header class="app">
  <h1>✨ <span class="grad">Life, Organized</span> ✨</h1>
  <div class="sub">your cute little HQ for goals, habits &amp; glow-ups 🌸 — everything saves automatically 💖</div>
</header>

<nav class="tabs">
  <div class="inner" id="tabBar"></div>
</nav>

<main id="main"></main>

<footer>
  <div><span id="saveFlash" class="save-flash">Saved ✓</span></div>
  <div style="display:flex; gap:8px;">
    <button id="exportBtn">Export data</button>
    <button id="importBtn">Import data</button>
    <button id="resetBtn">Reset all</button>
  </div>
</footer>
<input type="file" id="importFile" accept="application/json" style="display:none" />

<script>
/* ---------------- Storage ---------------- */
const KEY = "life-organized-v1";
let state = load();

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) return migrate(JSON.parse(raw));
  } catch (e) {}
  return defaultState();
}
function defaultState() {
  const s = {
    goals: { daily: [], weekly: [], monthly: [], quarterly: [] },
    habits: [],          // { id, name, days: { "2026-06-10": true } }
    targets: [],         // measurable goals with progress bars
    roadmap: null,       // summer skills plan
    audit: auditDefaults(),
    auditDate: today(),
    quarterTheme: "",
    reflections: { weekWin: "", weekImprove: "", quarterReview: "" },
    auditHistory: [],    // [{ date, areas: {name: avg}, overall }]
    gamification: { lastSeenLevel: 1 },
    seeded: false
  };
  seedContent(s);
  return s;
}

// Pre-fill Adri's real goals, targets, habits and summer roadmap.
// Only touches empty slots so it never clobbers work already in progress.
function seedContent(s) {
  if (s.seeded) return;
  const g = t => ({ text: t, done: false });
  if (!s.goals.daily.length) s.goals.daily = [
    g("Robotics: one atomic ROS2 task — leave a breadcrumb at the end"),
    g("CSWA: one practice section"),
    g("Movement: run, pilates, or strength"),
    g("Pull-up practice (negatives / band)")
  ];
  if (!s.goals.weekly.length) s.goals.weekly = [
    g("Run 3x this week"),
    g("Robotics ~7 hrs (1 hr/day)"),
    g("CSWA practice 1 hr/day"),
    g("Reach out to 1 new person / say yes to 1 social thing")
  ];
  if (!s.goals.monthly.length) s.goals.monthly = [
    g("Get ROS2 environment installed (weekend setup block)"),
    g("Finish ROS2 beginner tutorials: nodes, topics, services"),
    g("Sign up for a running club + first session"),
    g("Book a pilates intro class"),
    g("Post 2x on Instagram")
  ];
  if (!s.goals.quarterly.length) s.goals.quarterly = [
    g("Join a running club + start pilates"),
    g("Try a beginner hip-hop or salsa class"),
    g("Earn CSWA certification"),
    g("Ship a simulated ROS2 robot project on public GitHub"),
    { text: "Land a summer internship", done: true }
  ];
  if (!s.habits.length) s.habits = [
    { id: uid(), name: "Robotics — 1 hr (ROS2)", days: {} },
    { id: uid(), name: "CSWA — 1 hr practice", days: {} },
    { id: uid(), name: "Movement (run / pilates / strength)", days: {} },
    { id: uid(), name: "Pull-up practice", days: {} },
    { id: uid(), name: "Post or engage on Instagram", days: {} },
    { id: uid(), name: "Reach out to someone", days: {} }
  ];
  if (!s.targets.length) s.targets = [
    { id: uid(), icon: "🏅", name: "Longest non-stop run", unit: "km", type: "number", start: null, current: null, target: 10, mid: 5, note: "5k milestone, then 10k" },
    { id: uid(), icon: "🏃", name: "Fastest mile", unit: "min/mile", type: "time", start: null, current: null, target: 480 },
    { id: uid(), icon: "⚖️", name: "Body weight", unit: "lbs", type: "number", start: null, current: null, target: 115 },
    { id: uid(), icon: "💪", name: "Pull-ups in a row", unit: "reps", type: "number", start: 0, current: 0, target: 1 },
    { id: uid(), icon: "📸", name: "Instagram followers", unit: "followers", type: "number", start: null, current: null, target: 700 },
    { id: uid(), icon: "📝", name: "New posts this season", unit: "posts", type: "number", start: 0, current: 0, target: 2 },
    { id: uid(), icon: "🤝", name: "New friends", unit: "friends", type: "number", start: 0, current: 0, target: 5 }
  ];
  if (!s.roadmap) s.roadmap = defaultRoadmap();
  if (!s.quarterTheme) s.quarterTheme = "Build daily, finish small.";
  s.seeded = true;
}

function defaultRoadmap() {
  const t = x => ({ text: x, done: false });
  return {
    breadcrumb: "",
    headline: "Realistic win by end of August: solid ROS2 fundamentals + one simple simulated robot project on GitHub. That's plenty. Daily and consistent IS the good way — scope stays honest.",
    phases: [
      { title: "Phase 1 · ROS2 foundations", dates: "Weeks 1–3 · mid–late June", tasks: [
        t("Batch the painful install into a weekend block"),
        t("Set up Ubuntu + current ROS2 LTS (check docs.ros.org for Humble/Jazzy)"),
        t("Official beginner tutorials: nodes, topics, services, parameters"),
        t("Write your own publisher/subscriber in Python (rclpy)"),
        t("Type every tutorial, run it, then change one thing")
      ]},
      { title: "Phase 2 · Simulation + project kickoff", dates: "Weeks 4–6 · early–mid July", tasks: [
        t("Learn Gazebo basics + URDF"),
        t("Drive TurtleBot3 in simulation (modify a working robot)"),
        t("Pick a tiny project: obstacle-avoider or drive-to-goal"),
        t("Set up public GitHub repo on day one — README, commit often")
      ]},
      { title: "Phase 3 · Build the behavior", dates: "Weeks 7–9 · late July–mid Aug", tasks: [

/* ---------------- Date helpers ---------------- */
function today() { return toISO(new Date()); }
function toISO(d) { return d.toISOString().slice(0, 10); }
function startOfWeek(d) {
  const x = new Date(d);
  const day = (x.getDay() + 6) % 7; // Monday = 0
  x.setDate(x.getDate() - day);
  x.setHours(0,0,0,0);
  return x;
}
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
const DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
function fmtRange(start) {
  const end = addDays(start, 6);
  const opt = { month: "short", day: "numeric" };
  return start.toLocaleDateString(undefined, opt) + " – " + end.toLocaleDateString(undefined, opt);
}
function uid() { return Math.random().toString(36).slice(2, 9); }

function goalCard(title, scope, tagClass, hint) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<h2>${title} <span class="tag ${tagClass}">${scope}</span></h2><p class="hint">${hint}</p>`;
  const ul = document.createElement("ul");
  ul.className = "goal-list";
  card.appendChild(ul);

  function draw() {
    ul.innerHTML = "";
    state.goals[scope].forEach((g, i) => {
      const li = document.createElement("li");
      li.className = "goal-item" + (g.done ? " done" : "");
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = g.done;
      cb.onchange = () => { g.done = cb.checked; save(); draw(); checkLevelUp(); };
      const ta = document.createElement("textarea");
      ta.className = "text";
      ta.rows = 1;
      ta.placeholder = "Write a goal…";
      ta.value = g.text || "";
      ta.oninput = () => { g.text = ta.value; autogrow(ta); save(); };
      ta.onfocus = () => autogrow(ta);
      const del = document.createElement("button");
      del.className = "del";
      del.innerHTML = "✕";
      del.title = "Delete";
      del.onclick = () => { state.goals[scope].splice(i, 1); save(); draw(); };
      li.appendChild(cb); li.appendChild(ta); li.appendChild(del);
      ul.appendChild(li);
      setTimeout(() => autogrow(ta), 0);
    });
  }
  draw();
  const add = document.createElement("button");
  add.className = "add-btn";
  add.textContent = "+ Add goal";
  add.onclick = () => { state.goals[scope].push({ text: "", done: false }); save(); draw();
    setTimeout(() => { const tas = ul.querySelectorAll(".text"); tas[tas.length-1]?.focus(); }, 0); };
  card.appendChild(add);
  return card;
}

function currentStreak(h) {
  let count = 0;
  let d = new Date();
  // if today not done, start from yesterday so an ongoing streak still shows
  if (!h.days[toISO(d)]) d = addDays(d, -1);
  while (h.days[toISO(d)]) { count++; d = addDays(d, -1); }
  return count;
}

      row.appendChild(lab); row.appendChild(rating); row.appendChild(badge);
      card.appendChild(row);
    });

  });

  const rev = document.createElement("div");
  rev.className = "card";
  rev.style.marginTop = "16px";
  rev.innerHTML = `<h2>Quarterly review <span class="tag warm">reflect</span></h2><p class="hint">Looking at the wheel above — what's one area to invest in next quarter, and why?</p>`;
  const ta = document.createElement("textarea");
  ta.className = "notes"; ta.style.minHeight = "120px";
  ta.value = state.reflections.quarterReview || "";
  ta.oninput = () => { state.reflections.quarterReview = ta.value; save(); };

function areaAvg(area) {
  const scored = area.items.filter(i => i.score > 0);
  if (!scored.length) return 0;
  return scored.reduce((s, i) => s + i.score, 0) / scored.length;
}

function drawWheel() {
  const size = 340, cx = size/2, cy = size/2, R = 130;
  const segs = [];
  state.audit.forEach(area => area.items.forEach(it => segs.push({ ...it, color: area.color })));
  const n = segs.length;
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", `0 0 ${size} ${size}`);
  svg.setAttribute("width", "100%");
  svg.style.maxWidth = "340px";

  // grid rings
  for (let r = 1; r <= 5; r++) {
    const c = document.createElementNS(svg.namespaceURI, "circle");
    c.setAttribute("cx", cx); c.setAttribute("cy", cy);
    c.setAttribute("r", R * r / 5);
    c.setAttribute("fill", "none");
    c.setAttribute("stroke", "#ffd9ec");
    c.setAttribute("stroke-width", "1");
    svg.appendChild(c);
  }
  const ang = (2 * Math.PI) / n;
  function pt(i, rad) { const a = i * ang - Math.PI/2; return [cx + Math.cos(a)*rad, cy + Math.sin(a)*rad]; }

  // spokes
  for (let i = 0; i < n; i++) {
    const [x, y] = pt(i, R);
    const line = document.createElementNS(svg.namespaceURI, "line");
    line.setAttribute("x1", cx); line.setAttribute("y1", cy);
    line.setAttribute("x2", x); line.setAttribute("y2", y);
    line.setAttribute("stroke", "#ffd9ec"); line.setAttribute("stroke-width", "1");
    svg.appendChild(line);
  }
  // wedges
  for (let i = 0; i < n; i++) {
    const val = segs[i].score || 0;
    if (val === 0) continue;
    const rad = R * val / 10;
    const a0 = i * ang - Math.PI/2 - ang/2;
    const a1 = i * ang - Math.PI/2 + ang/2;
    const x0 = cx + Math.cos(a0)*rad, y0 = cy + Math.sin(a0)*rad;
    const x1 = cx + Math.cos(a1)*rad, y1 = cy + Math.sin(a1)*rad;
    const path = document.createElementNS(svg.namespaceURI, "path");
    path.setAttribute("d", `M ${cx} ${cy} L ${x0} ${y0} A ${rad} ${rad} 0 0 1 ${x1} ${y1} Z`);
    path.setAttribute("fill", segs[i].color);
    path.setAttribute("opacity", "0.55");
    path.setAttribute("stroke", segs[i].color);
    path.setAttribute("stroke-width", "1");
    svg.appendChild(path);
  }
  return svg;
}

/* ---------------- Gamification ---------------- */
const SCOPE_XP = { daily: 15, weekly: 30, monthly: 50, quarterly: 100 };
const LEVEL_TITLES = ["Seedling","Sprout","Sapling","Grower","Cultivator","Pathfinder","Trailblazer","Achiever","Champion","Luminary","Legend"];

// All XP is derived from current state, so it can never desync or double-count.
function totalXP() {
  let xp = 0;
  for (const scope in state.goals) {
    const w = SCOPE_XP[scope] || 15;
    state.goals[scope].forEach(g => { if (g.done) xp += w; });
  }
  state.habits.forEach(h => { xp += Object.keys(h.days).filter(d => h.days[d]).length * 10; });
  xp += (state.auditHistory || []).length * 40;
  (state.targets || []).forEach(t => { if (targetProgress(t) >= 1) xp += 120; });
  if (state.roadmap) {
    state.roadmap.phases.forEach(p => p.tasks.forEach(t => { if (t.done) xp += 25; }));
    state.roadmap.done.forEach(t => { if (t.done) xp += 60; });
  }
  return xp;
}
function xpForLevel(L) { return 50 * L * (L - 1); }   // cumulative XP to reach level L
function levelFromXP(xp) { let L = 1; while (xpForLevel(L + 1) <= xp) L++; return L; }
function levelTitle(L) { return LEVEL_TITLES[Math.min(L - 1, LEVEL_TITLES.length - 1)]; }

function goalsCompleted() {
  let n = 0; for (const s in state.goals) n += state.goals[s].filter(g => g.done).length; return n;
}
function habitsChecked() {
  return state.habits.reduce((s, h) => s + Object.keys(h.days).filter(d => h.days[d]).length, 0);
}
function bestStreakEver() {
  let best = 0;
  state.habits.forEach(h => {
    const days = Object.keys(h.days).filter(d => h.days[d]).sort();
    let run = 0, prev = null;
    days.forEach(d => {
      if (prev && Math.round((new Date(d) - new Date(prev)) / 86400000) === 1) run++; else run = 1;
      best = Math.max(best, run); prev = d;
    });
  });
  return best;
}
function activeDays() {
  const set = new Set();
  state.habits.forEach(h => Object.keys(h.days).forEach(d => { if (h.days[d]) set.add(d); }));
  return set.size;
}

function checkLevelUp() {
  const L = levelFromXP(totalXP());
  const seen = state.gamification.lastSeenLevel || 1;
  if (L !== seen) {
    state.gamification.lastSeenLevel = L;
    save();
    if (L > seen) celebrate(L);
  }
}
function celebrate(L) {
  const overlay = document.createElement("div");
  overlay.className = "celebrate-overlay";
  const colors = ["#ff5fa2","#c77dff","#ffc857","#ff9a8b","#ffffff","#ff8fab"];
  let confetti = "";
  for (let i = 0; i < 40; i++) {
    const left = Math.random() * 100, delay = Math.random() * 0.4, dur = 1.6 + Math.random() * 1.4;
    const col = colors[i % colors.length];
    confetti += `<div class="confetti" style="left:${left}%;background:${col};animation-duration:${dur}s;animation-delay:${delay}s;opacity:0"></div>`;
  }
  overlay.innerHTML = confetti +
    `<div class="celebrate-card">
       <div class="big">${L}</div>
       <h3>Level up!</h3>
       <p>You reached level ${L} — <strong>${levelTitle(L)}</strong>.</p>
       <button>Keep going</button>
     </div>`;
  overlay.querySelector("button").onclick = () => overlay.remove();
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function saveSnapshot() {
  const entry = { date: state.auditDate || today(), areas: {}, overall: 0 };
  let sum = 0, c = 0;
  state.audit.forEach(a => { const av = areaAvg(a); entry.areas[a.area] = av; if (av) { sum += av; c++; } });
  if (!c) { alert("Rate a few areas before saving a snapshot."); return; }
  entry.overall = sum / c;
  // replace any existing snapshot with the same date
  state.auditHistory = state.auditHistory.filter(s => s.date !== entry.date);
  state.auditHistory.push(entry);
  save();
  alert("Snapshot saved for " + entry.date + ". See it in the Progress tab.");
}

function auditTrendChart(hist) {
  const W = 620, H = 260, padL = 34, padR = 14, padT = 14, padB = 28;
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("width", "100%");
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const x = i => hist.length === 1 ? padL + innerW / 2 : padL + (innerW * i) / (hist.length - 1);
  const y = v => padT + innerH * (1 - v / 10);

  // gridlines + y labels (0,5,10)
  [0, 2, 4, 6, 8, 10].forEach(v => {
    const ln = document.createElementNS(svg.namespaceURI, "line");
    ln.setAttribute("x1", padL); ln.setAttribute("x2", W - padR);
    ln.setAttribute("y1", y(v)); ln.setAttribute("y2", y(v));
    ln.setAttribute("stroke", "#ffd9ec"); ln.setAttribute("stroke-width", v === 0 ? 1.5 : 1);
    svg.appendChild(ln);
    const t = document.createElementNS(svg.namespaceURI, "text");
    t.setAttribute("x", padL - 8); t.setAttribute("y", y(v) + 4);
    t.setAttribute("text-anchor", "end"); t.setAttribute("font-size", "10"); t.setAttribute("fill", "#c285a8");
    t.textContent = v; svg.appendChild(t);
  });
  // x labels
  hist.forEach((s, i) => {
    const t = document.createElementNS(svg.namespaceURI, "text");
    t.setAttribute("x", x(i)); t.setAttribute("y", H - 8);
    t.setAttribute("text-anchor", "middle"); t.setAttribute("font-size", "10"); t.setAttribute("fill", "#c285a8");
    t.textContent = s.date.slice(5); // MM-DD
    svg.appendChild(t);
  });

  function line(getVal, color, width) {
    const pts = hist.map((s, i) => [x(i), y(getVal(s))]);
    if (hist.length > 1) {
      const path = document.createElementNS(svg.namespaceURI, "path");
      path.setAttribute("d", "M " + pts.map(p => p.join(" ")).join(" L "));
      path.setAttribute("fill", "none"); path.setAttribute("stroke", color);
      path.setAttribute("stroke-width", width); path.setAttribute("stroke-linejoin", "round");
      path.setAttribute("stroke-linecap", "round");
      svg.appendChild(path);
    }
    pts.forEach(([px, py], i) => {
      if (getVal(hist[i]) === 0) return;
      const c = document.createElementNS(svg.namespaceURI, "circle");
      c.setAttribute("cx", px); c.setAttribute("cy", py); c.setAttribute("r", width + 1.5);
      c.setAttribute("fill", color);
      svg.appendChild(c);
    });
  }
  state.audit.forEach(a => line(s => s.areas[a.area] || 0, a.color, 2));
  line(s => s.overall || 0, "#6a2c4f", 3);
  return svg;
}

/* ---------------- Targets (measurable goals) ---------------- */
function targetProgress(t) {
  if (t.start == null || t.current == null || t.target == null) return 0;
  if (t.target === t.start) return t.current === t.target ? 1 : 0;
  const p = (t.current - t.start) / (t.target - t.start);
  return Math.max(0, Math.min(1, p));
}
function fmtVal(t, v) {
  if (v == null || v === "") return "—";
  return t.type === "time" ? secsToMMSS(v) : v + (t.unit ? " " + t.unit : "");
}
function secsToMMSS(s) { s = Math.round(s); return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0"); }
function mmssToSecs(str) {
  if (str == null || str === "") return null;
  if (typeof str === "number") return str;
  const m = String(str).match(/^(\d+):(\d{1,2})$/);
  if (m) return (+m[1]) * 60 + (+m[2]);
  const n = parseFloat(str); return isNaN(n) ? null : n;
}

function checkRow(task, xpLabel) {

  li.className = "goal-item" + (task.done ? " done" : "");
  const cb = document.createElement("input");
  cb.type = "checkbox"; cb.checked = task.done;
  cb.onchange = () => { task.done = cb.checked; save(); render(); };
  const span = document.createElement("span");
  span.className = "text"; span.style.whiteSpace = "normal";
  span.textContent = task.text;
  li.appendChild(cb); li.appendChild(span);
  if (xpLabel && !task.done) {
    const x = document.createElement("span");
    x.style.cssText = "font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap";
    x.textContent = xpLabel;
    li.appendChild(x);
  }
  return li;
}

/* ---------------- Utils ---------------- */
function escapeHtml(s) { return (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------------- Footer actions ---------------- */
document.getElementById("exportBtn").onclick = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "life-organized-" + today() + ".json"; a.click();
  URL.revokeObjectURL(url);
};
document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
document.getElementById("importFile").onchange = (e) => {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try { state = JSON.parse(r.result); save(); render(); alert("Data imported."); }
    catch (err) { alert("Could not read that file."); }
  };
  r.readAsText(file);
};
document.getElementById("resetBtn").onclick = () => {
  if (confirm("Erase everything and start fresh? This can't be undone.")) {
    state = defaultState(); save(); render();
  }
};

/* ---------------- Go ---------------- */
render();
</script>
</body>
</html>
